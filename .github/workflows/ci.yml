name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - run: sudo apt update && sudo apt install -y luarocks
            - run: luarocks install luacheck --local
            - run: luarocks install busted 2.2.0 --local
            - run: PATH="$HOME/.luarocks/bin:$PATH" busted
            - run: npm ci
            - run: npm run db:migrate
            - run: npm run db:seed
            - run: npm run lint:all
            - run: npm run format:all:check
            - run: npm test
